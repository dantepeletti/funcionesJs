<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/css/style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Panel de Administracion</h1>
        <nav>
            <a href="index.html">Volver a la tienda</a>
        </nav>
    </header>
    <section>
        <h2>Gestión de Inventario</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Imagen</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td><img src="img/cheese_burger.jpg" alt="cheese-burguer" width="50"></td>
                    <td>Cheese Burger</td>
                    <td>Hamburguesas</td>
                    <td>$12.99</td>
                    <td>12</td>
                    <td>
                        <a href="#">Editar</a> /
                        <a href="#">Eliminar</a>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><img src="img/hamburguesa_vegana.avif" alt="hamburguesa-vegana" width="50"></td>
                    <td>Burger Vegana</td>
                    <td>Hamburguesas</td>
                    <td>$15.99</td>
                    <td>7</td>
                    <td>
                        <a href="#">Editar</a> /
                        <a href="#">Eliminar</a>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td><img src="img/coca.jpg" alt="coca-cola" width="50"></td>
                    <td>Coca Cola</td>
                    <td>Bebidas</td>
                    <td>$4.99</td>
                    <td>25</td>
                    <td>
                        <a href="#">Editar</a> /
                        <a href="#">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <details>
            <summary>Agregar Producto</summary>
            <form>
                <label>Nombre:</label>
                <input type="text" name="nombre">
                <br><br>

                <label>Descripción:</label>
                <input type="text" name="descripcion">
                <br><br>

                <label>Stock Inicial:</label>
                <input type="number" name="stock">
                <br><br>

                <label>Precio:</label>
                <input type="number" name="precio">
                <br><br>

                <label>Categoría:</label>
                <select name="categoria">
                    <option value="hamburguesas">Hamburguesas</option>
                    <option value="pizzas">Pizzas</option>
                    <option value="bebidas">Bebidas</option>
                    <option value="postres">Postres</option>
                </select>
                <br><br>
                <button type="submit">Agregar</button>
            </form>
        </details>
    </section>
</body>
</html>
