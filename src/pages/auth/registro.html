<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Registro</title>
</head>
<body>
    <main class="container">
        <form id="formRegistro" class="form-login">
            <h1>Registro</h1>
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email"
                    name="email"
                    required
                >
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password"
                    id="password"
                    name="password"
                    required
                >
            </div>
            <button type="submit">
                Registrarse
            </button>
        </form>
    </main>

    <script type="module" src="../../../dist/pages/auth/registro.js"></script>
</body>
</html>
