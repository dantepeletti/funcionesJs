<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <form class="form-login" id="form-login">
            <h1>FOOD STRORE</h1>
            <h2>Iniciar Sesión</h2>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required>
            </div>
            <button type="submit">Iniciar Sesión</button>
            <p class="link__registro"> ¿No tienes cuenta? <a href="pages/registrar.html">Regístrate aquí</a></p>
        </form>
    </div>

    <script type="module" src="../../../dist/pages/auth/login.js"></script>
</html>
